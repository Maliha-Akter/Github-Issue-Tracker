<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Tracker Issues </title>
    <link rel="shortcut icon" href="../assets/github-logo.png" type="image/x-icon">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- tailwind + Daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- stylesheet -->
    <link rel="stylesheet" href="../style/style.css">
</head>

<body>

    <header class="mt-4 px-8  mx-auto flex flex-col gap-5 md:flex-row md:justify-between  shadow-sm pb-3 top-0 sticky pt-3 bg-white">
        <div class="card-github-img flex items-center gap-1">
            <img class="w-9" src="../assets/github-logo.png" alt="">
            <h1 class="font-semibold text-xl text-center"><a href="home.html">GitHub Issues Tracker</a></h1>
        </div>
        <div>
            <div class="join flex gap-4  bottom-4">
                <label class="input rounded-[4px] w-11/12">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="search-input" type="search" required placeholder="Search issues..." />
                </label>
                <button id="search-btn" class="btn bg-[#4A00FF] text-white join-item font-semibolds"><i
                        class="fa-solid fa-plus"></i>New
                    Issue</button>
            </div>
        </div>
    </header>
    <!-- main part start -->
    <section class="bg-[#F8FAFC] mt-14 w-11/12 mx-auto py-6  pl-6 rounded-sm shadow-lg ">
        <div class="flex gap-4 justify-center px-2 md:pl-0 md:justify-start">
            <button onclick="" id="All-btn"
                class="btn btn-ghost px-5 md:px-11 py-2 text-[#64748B] font-bold border border-gray-200 rounded-sm  hover:bg-[#83C8F2] hover:text-white ">All</button>
            <button id="Open-btn"
                class="btn btn-ghost px-5 md:px-11 py-2 text-[#64748B] font-bold border border-gray-200 rounded-sm hover:bg-[#83C8F2] hover:text-white">Open</button>
            <button id="Close-btn"
                class="btn btn-ghost px-5 md:px-11 py-2 text-[#64748B] font-bold border border-gray-200 rounded-sm hover:bg-[#83C8F2] hover:text-white">Closed</button>
        </div>

    </section>
    
    <!-- card part -->

    <section class="bg-[#F8FAFC] mt-14 w-11/12 mx-auto ">
        <section class="flex flex-col justify-center items-center md:flex-row md:justify-between px-6 rounded-sm shadow-lg border-b-2 border-b-gray-400 mb-10 py-6 md:py-1">
            <div class="left-side-container flex gap-2 py-6 w-9/12 ">
                <img class="p-1 md:p-2 h-10 w-10 border-none rounded-full bg-[#ECE4FF]" src="../assets/Aperture.png" alt="">
                <div>
                    <h2 class="font-semibold text-xl"><span id="card-number">50</span> Issues</h2>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="right-side-container flex gap-3">
                <div class="flex items-center gap-3">
                    <div class="w-4 h-4 rounded-full bg-[#00A96E] "></div>
                    <h1 class="font-semibold">Open</h1>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-4 h-4 rounded-full bg-[#A855F7]"></div>
                    <h1 class="font-semibold">Closed</h1>
                </div>
            </div>

        </section>
        <!-- spinner -->
     <section >
        <div id="spinner" class="flex items-center justify-center py-10 hidden">
            <span class="loading loading-spinner loading-xl"></span>
        </div>
     </section>
        <!-- card -->
        <div id="card-info" class="  mb-10 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 shadow-sm rounded-lg space-y-5 ">
            <!-- card-info part in main.js -->
        </div>

    </section>

    <!-- modal part -->
    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
            <div id="details-container" class="space-y-3">
                <!-- details-container part in main.js -->
            </div>
            <div class="modal-action">
                <form method="dialog">
                    <button class="btn bg-[#4A00FF] text-white focus:outline-none ">Close</button>
                </form>
            </div>
        </div>
    </dialog>
    
    <script src="../script/login.js"></script>
    <script src="../script/main.js"></script>
</body>

</html>
