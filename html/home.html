<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Tracker Issues </title>
    <link rel="shortcut icon" href="../assets/github-logo.png" type="image/x-icon">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- tailwind + Daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- stylesheet -->
    <link rel="stylesheet" href="../style/style.css">
</head>

<body>

    <header class="mt-4 w-11/12 border border-red-500 mx-auto flex justify-between">
        <div class="card-github-img flex items-center gap-1">
            <img class="w-9" src="../assets/github-logo.png" alt="">
            <h1 class="font-semibold text-xl text-center">GitHub Issues Tracker</h1>
        </div>
        <div>
            <div class="join flex gap-4  bottom-4">
                <label class="input rounded-[4px] w-11/12">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input type="search" required placeholder="Search issues..." />
                </label>
                <button class="btn bg-[#4A00FF] text-white join-item font-semibolds"><i class="fa-solid fa-plus"></i>New
                    Issue</button>
            </div>
        </div>
    </header>

    <!-- main part start -->
    <section class="bg-[#F8FAFC] mt-14 w-9/12 mx-auto py-6 pl-6 rounded-sm shadow-lg ">
        <div class="flex gap-4 ">
            <button
                class="btn btn-ghost px-11 py-2 text-[#64748B] font-bold border border-gray-200 rounded-sm">All</button>
            <button
                class="btn btn-ghost px-11 py-2 text-[#64748B] font-bold border border-gray-200 rounded-sm">Open</button>
            <button
                class="btn btn-ghost px-11 py-2 text-[#64748B] font-bold border border-gray-200 rounded-sm">Closed</button>
        </div>

    </section>
    <!-- card part -->

    <section class="bg-[#F8FAFC] mt-14 w-9/12 mx-auto">
        <section class="flex justify-between px-6 rounded-sm shadow-lg border-b-2 border-b-gray-400 ">
            <div class="left-side-container flex gap-2 py-6 w-9/12 ">
                <img class="p-2 border-none rounded-full bg-[#ECE4FF]" src="../assets/Aperture.png" alt="">
                <div>
                    <h2 class="font-semibold text-xl"><span>50</span> Issues</h2>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="right-side-container flex gap-3">
                <div class="flex items-center gap-3">
                    <div class="w-4 h-4 rounded-full bg-[#00A96E] "></div>
                    <h1 class="font-semibold">Open</h1>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-4 h-4 rounded-full bg-[#A855F7]"></div>
                    <h1 class="font-semibold">Closed</h1>
                </div>
            </div>

        </section>
        <!-- card -->
        <div class="w-4/12 shadow-sm rounded-lg mb-10">
            <section class=" border-b-2 border-b-gray-400 ">
                <div class="py-3  mt-10 p-4 space-y-4">
                    <div class="flex justify-between">
                        <div>
                            <img src="../assets/Closed- Status .png" alt="">
                            <!-- <img src="../assets/Open-Status.png" alt=""> -->
                        </div>
                        <div>
                            <p>High</p>
                        </div>

                    </div>
                    <div class="card-text">
                        <h1 class="font-semibold">Fix navigation menu on mobile devices</h1>
                        <p class="text-[#64748B] text-xs">The navigation menu doesn't collapse properly on mobile
                            devices...</p>
                    </div>
                    <div class="bug-part flex items-center gap-2">
                        <div class="flex items-center gap-1 border border-red-400 rounded-2xl px-3">
                            <img src="../assets/Vector.png" class="w-3 h-3" alt="">
                            <p class="text-red-400 font-semibold">BUG</p>
                        </div>
                        <div class="flex items-center gap-1 border border-yellow-400 rounded-2xl px-3">
                            <img src="../assets/Lifebuoy.png" class="w-3 h-3" alt="">
                            <p class="text-yellow-400 font-semibold">HELP WANTED</p>
                        </div>
                    </div>
                </div>
            </section>
            <div class="p-4 space-y-2">
                <p class="text-xs">#1 by john_doe</p>
                <p class="text-xs">1/15/2024</p>
            </div>
        </div>

    </section>
    <script src="../script/login.js"></script>
</body>

</html>
