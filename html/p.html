<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="shadow-sm rounded-lg h-full">
                <section class=" border-b-2 border-b-gray-400 ">
                <div class="py-3  mt-10 p-4 space-y-4">
                    <div class="flex justify-between">
                        <div>
                            <img src="../assets/Closed- Status .png" alt="">
                            <img src="../assets/Open-Status.png" alt="">
                        </div>
                        <div>
                            <p>High</p>
                        </div>

                    </div>
                    <div class="card-text">
                        <div class = "min-h-16">
                        <h1 class="font-semibold">${card.title}</h1>
                        </div>
                        <div class = "min-h-16">
                        <p class="text-[#64748B] text-xs">${card.description}</p>
                        </div>
                    </div>
                    <div class="bug-part flex items-center gap-2">
                        <div class="flex items-center gap-1 border border-red-400 rounded-2xl px-3">
                            <img src="../assets/Vector.png" class="w-3 h-3" alt="">
                            <p class="text-red-400 font-semibold">BUG</p>
                        </div>
                        <div class="flex items-center gap-1 border border-yellow-400 rounded-2xl px-3">
                            <img src="../assets/Lifebuoy.png" class="w-3 h-3" alt="">
                            <p class="text-yellow-400 font-semibold">HELP WANTED</p>
                        </div>
                    </div>
                </div>
            </section>
            <div class="p-4 space-y-2">
                <div class="flex justify-between items-center">
                    <p class="text-xs">${card.author}</p>
                    <p class="text-xs">${card.createdAt}</p>
                    
                </div>
                <div>
                    <p class="text-xs">Assignee : ${card.author}</p>
                    <p class="text-xs">${card.updatedAt}</p>
                </div>
            </div>
            </div>
</body>
</html>
